// Evidence receipt schema (D1)
// Protobuf is for schema definition and type generation ONLY.
// Wire format is ALWAYS canonical JSON (RFC 8785). (D4)

syntax = "proto3";
package aegis.schemas;

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";

message Receipt {
  string id = 1;                          // UUID v7
  string type = 2;                        // ReceiptType enum as string
  google.protobuf.Timestamp timestamp = 3;
  string prev_hash = 4;                   // SHA-256 hex
  string payload_hash = 5;                // SHA-256 hex
  string signature = 6;                   // Ed25519 signature hex
  uint64 seq = 7;                         // Monotonic sequence number

  // Optional fields
  optional string counterparty = 10;
  optional string service = 11;
  optional google.protobuf.Struct metadata = 12;

  // Enterprise nullable fields (always present in schema)
  optional string fleet_id = 20;
  optional string warden_key = 21;
  optional string policy_url = 22;
  optional string issuer_key_id = 23;
  optional google.protobuf.Struct compliance_extensions = 24;
  optional google.protobuf.Struct fleet_aggregate = 25;
}

message Claim {
  string id = 1;
  string type = 2;
  string namespace = 3;
  string attester_id = 4;
  double confidence = 5;
  TemporalScope temporal_scope = 6;
  repeated string provenance = 7;         // Receipt IDs
  string schema_version = 8;
  optional double confabulation_score = 9;
  optional bool temporal_coherence_flag = 10;
  optional uint32 distinct_warden_count = 11;
  google.protobuf.Struct payload = 12;
}

message TemporalScope {
  google.protobuf.Timestamp start = 1;
  optional google.protobuf.Timestamp end = 2;
}

message TrustmarkScore {
  double score = 1;
  TrustmarkDimensions dimensions = 2;
  string tier = 3;
  google.protobuf.Timestamp computed_at = 4;
}

message TrustmarkDimensions {
  double relay_reliability = 1;
  double persona_integrity = 2;
  double chain_integrity = 3;
  double contribution_volume = 4;
  double temporal_consistency = 5;
  double vault_hygiene = 6;
}
