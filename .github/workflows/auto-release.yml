# Auto-release — bumps version, builds cross-platform binaries, publishes GitHub Release
#
# Flow: PR merged to main → this workflow does everything:
#   1. Run tests
#   2. Bump version in Cargo.toml (patch by default)
#   3. Commit + tag
#   4. Cross-compile 4 platforms
#   5. Publish GitHub Release with binaries + checksums
#
# To control bump type, add a label to the PR:
#   "release:minor" → 0.2.0 → 0.3.0
#   "release:major" → 0.2.0 → 1.0.0
#   "release:skip"  → no release
#   (no label)      → patch bump: 0.2.0 → 0.2.1

name: Auto Release

on:
  push:
    branches: [main]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Test ───────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run workspace tests
        run: cargo test --workspace

  # ── Bump Version ──────────────────────────────────────────
  bump:
    name: Bump Version & Tag
    needs: test
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.skip_check.outputs.skip }}
      tag: ${{ steps.version.outputs.tag }}
      next: ${{ steps.version.outputs.next }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for release:skip label on merged PR
        id: skip_check
        run: |
          COMMIT_SHA="${{ github.sha }}"
          PR_NUMBER=$(gh pr list --state merged --search "$COMMIT_SHA" --json number --jq '.[0].number // empty')

          if [ -n "$PR_NUMBER" ]; then
            LABELS=$(gh pr view "$PR_NUMBER" --json labels --jq '.labels[].name' 2>/dev/null || echo "")
            echo "pr=$PR_NUMBER" >> "$GITHUB_OUTPUT"
            echo "labels=$LABELS" >> "$GITHUB_OUTPUT"

            if echo "$LABELS" | grep -q "release:skip"; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "::notice::Skipping release (release:skip label found on PR #$PR_NUMBER)"
            else
              echo "skip=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "labels=" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine bump type
        if: steps.skip_check.outputs.skip != 'true'
        id: bump
        run: |
          LABELS="${{ steps.skip_check.outputs.labels }}"
          if echo "$LABELS" | grep -q "release:major"; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | grep -q "release:minor"; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Read current version and compute next
        if: steps.skip_check.outputs.skip != 'true'
        id: version
        run: |
          CURRENT=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          BUMP="${{ steps.bump.outputs.type }}"

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEXT="${MAJOR}.${MINOR}.${PATCH}"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEXT" >> "$GITHUB_OUTPUT"
          echo "::notice::Version bump: $CURRENT → $NEXT ($BUMP)"

      - name: Check tag doesn't already exist
        if: steps.skip_check.outputs.skip != 'true'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG already exists — skipping"
            exit 1
          fi

      - name: Bump version in Cargo.toml
        if: steps.skip_check.outputs.skip != 'true'
        run: |
          CURRENT="${{ steps.version.outputs.current }}"
          NEXT="${{ steps.version.outputs.next }}"
          sed -i "s/^version = \"$CURRENT\"/version = \"$NEXT\"/" Cargo.toml
          echo "Updated Cargo.toml:"
          grep '^version = ' Cargo.toml

      - name: Commit and tag
        if: steps.skip_check.outputs.skip != 'true'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml
          git commit -m "release: $TAG"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin main --follow-tags

  # ── Build Cross-Platform Binaries ─────────────────────────
  build-release:
    name: Build (${{ matrix.target }})
    needs: bump
    if: needs.bump.outputs.skip != 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: aegis-linux-x86_64
            binary: aegis
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: aegis-darwin-x86_64
            binary: aegis
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: aegis-darwin-aarch64
            binary: aegis
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: aegis-windows-x86_64.exe
            binary: aegis.exe
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump.outputs.tag }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} --bin aegis

      - name: Rename binary for release
        shell: bash
        run: cp target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.artifact_name }}

      - name: Generate SHA-256 checksum
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            shasum -a 256 ${{ matrix.artifact_name }} > ${{ matrix.artifact_name }}.sha256
          else
            sha256sum ${{ matrix.artifact_name }} > ${{ matrix.artifact_name }}.sha256
          fi

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.artifact_name }}
            ${{ matrix.artifact_name }}.sha256

  # ── Publish GitHub Release ────────────────────────────────
  publish-release:
    name: Publish GitHub Release
    needs: [bump, build-release]
    if: needs.bump.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Flatten artifact directories
        run: |
          mkdir -p release-files
          find artifacts/ -type f -exec cp {} release-files/ \;
          ls -la release-files/

      - name: Copy install script
        run: cp install/install.sh release-files/install.sh

      - name: Generate release notes
        run: |
          cat > release-notes.md << 'EOF'
          ## Install

          ```bash
          curl -fsSL https://github.com/AEGIS-GB/neural-commons/releases/latest/download/install.sh | bash
          ```

          Or download the binary for your platform below and place it in your PATH.

          ## Quick Start

          ```bash
          aegis setup openclaw    # connect to your OpenClaw agent
          aegis                   # start protection (observe-only mode)
          ```

          Dashboard: http://localhost:3141/dashboard

          ## Checksums

          Verify your download:
          ```bash
          sha256sum -c aegis-linux-x86_64.sha256
          ```

          ## What's Included

          - Evidence recorder — tamper-evident receipt chain for every API call
          - Write barrier — protects SOUL.md, AGENTS.md, IDENTITY.md, TOOLS.md, BOOT.md
          - Credential vault — encrypted storage, plaintext scanner
          - SLM injection screening — via Ollama (heuristic fallback if unavailable)
          - Memory monitor — watches MEMORY.md, HEARTBEAT.md, USER.md
          - Dashboard — localhost web UI showing security posture
          - CLI — scan, export, vault, memory, setup commands
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.bump.outputs.tag }}
          name: "Aegis ${{ needs.bump.outputs.tag }}"
          body_path: release-notes.md
          files: |
            release-files/aegis-linux-x86_64
            release-files/aegis-linux-x86_64.sha256
            release-files/aegis-darwin-x86_64
            release-files/aegis-darwin-x86_64.sha256
            release-files/aegis-darwin-aarch64
            release-files/aegis-darwin-aarch64.sha256
            release-files/aegis-windows-x86_64.exe
            release-files/aegis-windows-x86_64.exe.sha256
            release-files/install.sh
          draft: false
          prerelease: false
