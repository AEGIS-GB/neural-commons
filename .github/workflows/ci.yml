# Neural Commons CI — runs on every push and PR
# Cross-compile: Linux, macOS, Windows
# 4-layer test architecture (layers 1-3 in CI, layer 4 nightly)

name: CI

on:
  push:
    branches: [main, develop]
    tags-ignore: ['v*']  # Release workflow handles tag pushes — don't duplicate CI
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Check & Lint ──────────────────────────────────────────────
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: cargo check (all targets)
        run: cargo check --workspace --all-targets
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings -A unexpected_cfgs -A clippy::too_many_arguments -A clippy::type_complexity -A dead_code -A clippy::match_like_matches_macro -A clippy::ptr_arg -A clippy::manual_strip -A clippy::needless_range_loop -A clippy::new_without_default -A clippy::manual_contains -A unused_variables -A unused_imports -A clippy::useless_format -A clippy::overly_complex_bool_expr -A unused_mut -A clippy::blocks_in_conditions -A clippy::collapsible_if
      - name: cargo fmt check
        run: cargo fmt --all -- --check

  # ── Tests (cross-platform) ───────────────────────────────────
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: check
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # All unit tests across the workspace
      - name: Run workspace tests
        run: cargo test --workspace

  # ── Contract Tests (Layer 1) ──────────────────────────────────
  contract-tests:
    name: Layer 1 - Contract Tests
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Run contract tests
        run: cargo test -p contract-tests
        continue-on-error: true  # package may not exist yet

  # ── Build Release Binaries ────────────────────────────────────
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: aegis
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: aegis
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: aegis.exe
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} --bin aegis

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: aegis-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ matrix.binary }}

  # ── E2E Smoke Test ───────────────────────────────────────────
  smoke-test:
    name: E2E Smoke Test
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run smoke test
        run: ./tests/e2e/smoke_test.sh

  # ── Security Audit ────────────────────────────────────────────
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Run audit
        run: cargo audit
        continue-on-error: true  # advisory db may flag non-critical items
