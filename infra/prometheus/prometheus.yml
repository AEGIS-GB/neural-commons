# Prometheus configuration for Neural Commons

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "nats"
    static_configs:
      - targets: ["nats:8222"]
    metrics_path: /varz

  - job_name: "gateway"
    static_configs:
      - targets: ["gateway:8080"]
    metrics_path: /metrics

  - job_name: "trustmark"
    static_configs:
      - targets: ["trustmark:8081"]
    metrics_path: /metrics

  - job_name: "botawiki"
    static_configs:
      - targets: ["botawiki:8082"]
    metrics_path: /metrics
